<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Trading Bot</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0px 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; color: white; }
        .btn-start { background-color: #28a745; }
        .btn-stop { background-color: #dc3545; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        .profit { color: green; font-weight: bold; }
        .loss { color: red; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🚀 Dashboard Trading Bot</h1>

    <!-- Contrôles du Bot -->
    <div class="card">
        <h2>Contrôle</h2>
        <p>Statut actuel : <strong id="bot-state">Chargement...</strong></p>
        <button class="btn btn-start" onclick="actionBot('/start')">Démarrer</button>
        <button class="btn btn-stop" onclick="actionBot('/stop')">Arrêter</button>
    </div>

    <!-- Statistiques -->
    <div class="card">
        <h2>Statistiques en direct</h2>
        <p>Prix actuel de la crypto : <strong id="current-price">0.00</strong> $</p>
        <p>Capital actuel : <strong id="current-capital">0.00</strong> $</p>
    </div>

    <!-- Historique des Trades -->
    <div class="card">
        <h2>Historique des Trades (50 derniers)</h2>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Prix Achat</th>
                    <th>Prix Vente</th>
                    <th>Performance</th>
                    <th>Statut</th>
                </tr>
            </thead>
            <tbody id="trades-list">
                <!-- Les trades s'afficheront ici -->
            </tbody>
        </table>
    </div>

    <script>
    // Met à jour les statistiques toutes les 2 secondes
    async function fetchStats() {
        try {
            const response = await fetch('/stats');
            const data = await response.json();
            
            // Mise à jour des textes
            document.getElementById('price').innerText = data.price.toFixed(2) + ' $';
            document.getElementById('capital').innerText = data.capital.toFixed(2) + ' $';
            document.getElementById('status').innerText = data.status;
            
        } catch (error) {
            console.error("Erreur lors de la récupération des stats :", error);
        }
    }

    // Fonction pour démarrer le bot (avec POST)
    async function startBot() {
        try {
            const response = await fetch('/start', { 
                method: 'POST' // <-- C'est ici la correction !
            });
            const data = await response.json();
            console.log(data.message);
            fetchStats(); // Met à jour l'interface immédiatement
        } catch (error) {
            console.error("Erreur lors du démarrage :", error);
        }
    }

    // Fonction pour arrêter le bot (avec POST)
    async function stopBot() {
        try {
            const response = await fetch('/stop', { 
                method: 'POST' // <-- C'est ici la correction !
            });
            const data = await response.json();
            console.log(data.message);
            fetchStats(); // Met à jour l'interface immédiatement
        } catch (error) {
            console.error("Erreur lors de l'arrêt :", error);
        }
    }

    // Lancer la mise à jour automatique toutes les 2 secondes (2000 ms)
    setInterval(fetchStats, 2000);
    
    // Charger les stats une première fois dès l'ouverture de la page
    fetchStats();
</script>


</body>
</html>
