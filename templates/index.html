<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Bot Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1e1e2f; color: #ffffff; padding: 20px; }
        .card { background-color: #2a2a40; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .stat-value { font-size: 24px; font-weight: bold; color: #00d2ff; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #444; }
        th { background-color: #33334d; }
        .green { color: #28a745; font-weight: bold; }
        .red { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🚀 Dashboard Trading Bot</h1>

    <div class="card">
        <h2>📊 Statistiques en Direct</h2>
        <p>Prix BTC/USDT : <span class="stat-value" id="price">Chargement...</span></p>
        <p>Capital Actuel : <span class="stat-value" id="capital">Chargement...</span></p>
        <p>Statut du Bot : <span id="status" style="color: #ffcc00;">Chargement...</span></p>
    </div>

    <div class="card">
        <h2>📜 Historique des 10 derniers Trades</h2>
        <table>
            <thead>
                <tr>
                    <th>Heure</th>
                    <th>Prix Achat</th>
                    <th>Prix Vente</th>
                    <th>Performance</th>
                </tr>
            </thead>
            <tbody id="trade-list">
                <tr><td colspan="4">En attente du premier trade...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        async function fetchStats() {
            try {
                const response = await fetch('/stats');
                const data = await response.json();

                // Mise à jour des stats globales
                document.getElementById('price').innerText = data.price.toFixed(2) + " $";
                document.getElementById('capital').innerText = data.capital.toFixed(2) + " $";
                document.getElementById('status').innerText = data.status;

                // Mise à jour de l'historique des trades
                const tbody = document.getElementById('trade-list');
                
                if (data.trades.length > 0) {
                    tbody.innerHTML = ""; // On vide le tableau
                    
                    // On parcourt les trades en sens inverse pour avoir le plus récent en haut
                    [...data.trades].reverse().forEach(trade => {
                        const isWin = trade.profit > 0;
                        const colorClass = isWin ? "green" : "red";
                        const sign = isWin ? "+" : "";

                        const row = document.createElement("tr");
                        row.innerHTML = `
                            <td>${trade.time}</td>
                            <td>${trade.buy_price.toFixed(2)} $</td>
                            <td>${trade.sell_price.toFixed(2)} $</td>
                            <td class="${colorClass}">${sign}${trade.profit.toFixed(2)} %</td>
                        `;
                        tbody.appendChild(row);
                    });
                }
            } catch (error) {
                console.error("Erreur de récupération des données :", error);
            }
        }

        // Rafraîchir toutes les 2 secondes
        setInterval(fetchStats, 2000);
        fetchStats(); // Premier appel immédiat
    </script>

</body>
</html>
